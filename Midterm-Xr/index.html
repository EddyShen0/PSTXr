<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-Frame Portal Demo</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<script>
    
AFRAME.registerComponent('portal-system', {
  init: function () {
    this.el.addEventListener('loaded', () => { this._setup(); });
  },

  _setup: function () {
    const renderer = this.el.renderer;
    const canvas   = renderer.domElement;

    const portalEl = document.querySelector('#portal');
    if (!portalEl) { console.error('No #portal found'); return; }

    const ensureMesh = () => {
      this.portalMesh = portalEl.getObject3D('mesh');
      if (!this.portalMesh) {
        portalEl.addEventListener('object3dset', () => {
          this.portalMesh = portalEl.getObject3D('mesh');
          this._applyRenderTarget();
        }, { once: true });
      } else {
        this._applyRenderTarget();
      }
    };

    this.renderTarget = new THREE.WebGLRenderTarget(
      canvas.width  || 1024,
      canvas.height || 1024,
      { format: THREE.RGBAFormat }
    );

    const aspect = (canvas.width || window.innerWidth) /
                   (canvas.height || window.innerHeight);
    this.portalCamera = new THREE.PerspectiveCamera(75, aspect, 0.01, 1000);

    window.addEventListener('resize', () => {
      const w = renderer.domElement.width;
      const h = renderer.domElement.height;
      this.renderTarget.setSize(w, h);
      this.portalCamera.aspect = w / h;
    });

    this.portalScene = new THREE.Scene();
    this.portalScene.background = new THREE.Color(0x111133);

    const otherWorldEl = document.querySelector('#otherWorld');
    if (otherWorldEl) {
      this.portalScene.add(otherWorldEl.object3D);
      this.portalScene.add(new THREE.AmbientLight(0xffffff, 0.8));
      const dir = new THREE.DirectionalLight(0xffffff, 1.0);
      dir.position.set(5, 10, 5);
      this.portalScene.add(dir);
    }

    this.portalEl     = portalEl;
    this.portalWidth  = 2 *0.116; 
    this.portalHeight = 2*0.1; 

    this.exitPosition = new THREE.Vector3(0, 1.6, 2);

    this.playerEl = document.querySelector('#player');

    this._playerWorldPos  = new THREE.Vector3();
    this._portalWorldPos  = new THREE.Vector3();
    this._portalQuat      = new THREE.Quaternion();
    this._portalRight     = new THREE.Vector3();
    this._portalUp        = new THREE.Vector3();
    this._portalNormal    = new THREE.Vector3();
    this._camPos          = new THREE.Vector3();
    this._toPortal        = new THREE.Vector3();
    this._projMatrix      = new THREE.Matrix4();

    ensureMesh();
    this._ready = true;
  },

  _applyRenderTarget: function () {
    if (!this.portalMesh) return;
    this.portalMesh.material = new THREE.MeshBasicMaterial({
      map:  this.renderTarget.texture,
      side: THREE.DoubleSide
    });
  },

  _buildObliqueFrustum: function (camPos, portalCenter, right, up, normal, hw, hh) {
    const bl = portalCenter.clone()
      .addScaledVector(right, -hw)
      .addScaledVector(up,    -hh);
    const br = portalCenter.clone()
      .addScaledVector(right,  hw)
      .addScaledVector(up,    -hh);
    const tl = portalCenter.clone()
      .addScaledVector(right, -hw)
      .addScaledVector(up,     hh);

    const vbl = bl.clone().sub(camPos);
    const vbr = br.clone().sub(camPos);
    const vtl = tl.clone().sub(camPos);

    const near = Math.abs(normal.dot(vbl));
    if (near < 0.001) return null;

    const left   = right.dot(vbl) * (this.portalCamera.near / near);
    const rightE = right.dot(vbr) * (this.portalCamera.near / near);
    const bottom = up.dot(vbl)    * (this.portalCamera.near / near);
    const top    = up.dot(vtl)    * (this.portalCamera.near / near);

    const proj = new THREE.Matrix4();
    proj.makePerspective(left, rightE, top, bottom,
                         this.portalCamera.near,
                         this.portalCamera.far);
    return proj;
  },

  tick: function () {
    if (!this._ready || !this.portalMesh || !this.portalScene) return;

    const renderer = this.el.renderer;

    this.playerEl.object3D.getWorldPosition(this._playerWorldPos);

    this.portalEl.object3D.getWorldPosition(this._portalWorldPos);
    this.portalEl.object3D.getWorldQuaternion(this._portalQuat);

    this._portalRight .set(1,0,0).applyQuaternion(this._portalQuat).normalize();
    this._portalUp    .set(0,1,0).applyQuaternion(this._portalQuat).normalize();
    this._portalNormal.set(0,0,1).applyQuaternion(this._portalQuat).normalize();

    this._toPortal.subVectors(this._playerWorldPos, this._portalWorldPos);
    const lateralRight = this._toPortal.dot(this._portalRight);
    const lateralUp    = this._toPortal.dot(this._portalUp);
    const depth        = this._toPortal.dot(this._portalNormal);

    this._camPos.copy(this.exitPosition)
      .addScaledVector(this._portalRight, lateralRight)
      .addScaledVector(this._portalUp,    lateralUp)
      .addScaledVector(this._portalNormal, depth);

    this.portalCamera.position.copy(this._camPos);

    const lookDir = this._portalNormal.clone().negate();
    const m = new THREE.Matrix4().lookAt(
      this._camPos,
      this._camPos.clone().add(lookDir),
      this._portalUp
    );
    this.portalCamera.quaternion.setFromRotationMatrix(m);
    this.portalCamera.updateMatrixWorld(true);

    const portalCenterOtherWorld = this.exitPosition.clone();

    const proj = this._buildObliqueFrustum(
      this._camPos,
      portalCenterOtherWorld,
      this._portalRight,
      this._portalUp,
      this._portalNormal,
      this.portalWidth  / 2,
      this.portalHeight / 2
    );

    if (proj) {
      this.portalCamera.projectionMatrix.copy(proj);
      this.portalCamera.projectionMatrixInverse.copy(proj).invert();
    } else {
      this.portalCamera.updateProjectionMatrix();
    }

    renderer.setRenderTarget(this.renderTarget);
    renderer.clear();
    renderer.render(this.portalScene, this.portalCamera);
    renderer.setRenderTarget(null);
  }
});
</script>
